<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hover Zoom Image Test Page</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 40px;
      background: #121214;
      color: #eaeaea;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    h1 {
      margin-bottom: 10px;
      color: #a78bfa;
    }
    .gallery {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 20px;
    }
    .gallery-card {
      background: #1e1e24;
      border: 1px solid #2e2e38;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
      width: 250px;
    }
    .gallery-card:hover {
      transform: translateY(-4px);
      border-color: #7c3aed;
    }
    .gallery-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
    }
    .desc {
      margin-top: 10px;
      font-size: 14px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <h1>Image Zoom+ Extension Test Bed</h1>
  <p>Hover over the images below to trigger the extension's zoom overlay. Drag the resize handles of the popup to verify that the image scales correctly.</p>
  
  <div class="gallery">
    <div class="gallery-card">
      <img src="https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=600&auto=format&fit=crop&q=80" alt="Vibrant Abstract Gradient">
      <div class="desc">Abstract Gradient Image (600px wide)</div>
    </div>
    <div class="gallery-card">
      <!-- A smaller image to check small image scale up -->
      <img src="https://images.unsplash.com/photo-1557683316-973673baf926?w=200&auto=format&fit=crop&q=80" alt="Small Purple Gradient">
      <div class="desc">Small Gradient Image (200px wide)</div>
    </div>
  </div>
</body>
</html>
